    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Courier New', Courier, 'Noto Sans KR', monospace;
            background-color: #1a1a1a;
            color: #e0e0e0;
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
            position: relative;
        }

        /* ===== BRUTALIST RAW TEXTURES ===== */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 4px),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 4px);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(100, 100, 100, 0.1) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ===== TYPOGRAPHY ===== */
        h1, h2, h3, h4 {
            font-weight: 700;
            letter-spacing: -0.03em;
            color: #ffffff;
        }

        h1 {
            font-size: 2.8rem;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            border-left: 6px solid #ff6b35;
            padding-left: 1rem;
            text-transform: uppercase;
        }

        h2 {
            font-size: 2rem;
            line-height: 1.2;
            margin: 2.5rem 0 1.2rem;
            border-bottom: 3px solid #ff6b35;
            padding-bottom: 0.5rem;
            display: inline-block;
        }

        h3 {
            font-size: 1.4rem;
            line-height: 1.3;
            margin: 1.8rem 0 0.8rem;
            color: #ff8c5a;
        }

        h4 {
            font-size: 1.1rem;
            line-height: 1.4;
            margin: 1.2rem 0 0.5rem;
            color: #cccccc;
        }

        p, li, blockquote {
            font-size: 1rem;
            margin-bottom: 1rem;
            color: #d4d4d4;
        }

        a {
            color: #ff6b35;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s, color 0.2s;
        }

        a:hover {
            border-bottom-color: #ff6b35;
            color: #ffa07a;
        }

        /* ===== LAYOUT & CONTAINERS ===== */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 15px;
            position: relative;
            z-index: 1;
        }

        /* ===== NAVIGATION ===== */
        nav {
            background: #222222;
            padding: 15px 25px;
            margin-bottom: 40px;
            border: 2px solid #ff6b35;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            position: relative;
            z-index: 10;
        }

        .nav-logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            border: none;
        }

        .nav-logo:hover {
            border: none;
            color: #ff6b35;
        }

        .nav-menu {
            display: flex;
            gap: 20px;
            list-style: none;
            align-items: center;
        }

        .nav-menu li a {
            font-size: 1rem;
            padding: 5px 10px;
            border: 1px solid transparent;
            transition: border-color 0.2s, background 0.2s;
        }

        .nav-menu li a:hover {
            border-color: #ff6b35;
            background: rgba(255,107,53,0.1);
        }

        .nav-menu li a.active {
            border-color: #ff6b35;
            background: rgba(255,107,53,0.15);
            color: #ffa07a;
        }

        .hamburger-menu {
            display: none;
            flex-direction: column;
            cursor: pointer;
            padding: 5px;
        }

        .hamburger-menu span {
            width: 28px;
            height: 3px;
            background: #ffffff;
            margin: 4px 0;
            transition: 0.3s;
        }

        /* ===== HERO / MAIN SECTIONS ===== */
        .page-header {
            margin-bottom: 3rem;
        }

        .page-header p {
            font-size: 1.1rem;
            color: #b0b0b0;
            max-width: 700px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin: 2rem 0;
        }

        .card {
            background: #2a2a2a;
            padding: 25px;
            border: 2px solid #3a3a3a;
            transition: border-color 0.3s, transform 0.2s;
        }

        .card:hover {
            border-color: #ff6b35;
            transform: translateY(-4px);
        }

        .card h3 {
            margin-top: 0;
        }

        .card .stat {
            font-size: 2.2rem;
            font-weight: 700;
            color: #ff6b35;
            display: block;
            margin: 0.5rem 0;
        }

        .faq-item {
            border-bottom: 1px solid #3a3a3a;
            padding: 1.2rem 0;
        }

        .faq-item:last-child {
            border-bottom: none;
        }

        .faq-question {
            font-weight: 700;
            font-size: 1.1rem;
            color: #ffffff;
            cursor: default;
            margin-bottom: 0.3rem;
        }

        .faq-answer {
            color: #b0b0b0;
            margin-top: 0.3rem;
        }

        .tel-link {
            display: inline-block;
            font-size: 1.3rem;
            font-weight: 700;
            color: #ff6b35;
            border: 2px solid #ff6b35;
            padding: 8px 20px;
            margin: 1rem 0;
            transition: background 0.2s, color 0.2s;
        }

        .tel-link:hover {
            background: #ff6b35;
            color: #1a1a1a;
            border-color: #ff6b35;
        }

        /* ===== FOOTER ===== */
        footer {
            margin-top: 4rem;
            padding: 30px 0;
            border-top: 2px solid #333;
            text-align: center;
            color: #888;
            font-size: 0.9rem;
        }

        footer a {
            color: #888;
        }

        footer a:hover {
            color: #ff6b35;
        }

        /* ===== RESPONSIVE 768 ===== */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            h1 {
                font-size: 2rem;
            }

            h2 {
                font-size: 1.5rem;
            }

            nav {
                flex-direction: column;
                align-items: flex-start;
                padding: 12px 15px;
            }

            .nav-menu {
                display: none;
                flex-direction: column;
                width: 100%;
                margin-top: 15px;
                gap: 10px;
                padding: 10px 0;
                border-top: 1px solid #3a3a3a;
            }

            .nav-menu.open {
                display: flex;
            }

            .hamburger-menu {
                display: flex;
                position: absolute;
                top: 15px;
                right: 15px;
            }

            .card-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head
</body>
</html>
